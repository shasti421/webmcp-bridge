name: Bug
description: Something is broken
labels: ["bug"]
body:
  - type: input
    id: package
    attributes:
      label: Package
      placeholder: "core | playwright | extension | python-sdk | registry | cli"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
