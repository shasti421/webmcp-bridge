[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "webmcp-bridge"
version = "0.1.0"
description = "Python SDK for WebMCP Bridge with Strands Agents integration"
requires-python = ">=3.10"
dependencies = [
    "strands-agents>=0.1.0",
    "strands-agents-tools>=0.1.0",
    "playwright>=1.42.0",
    "pyyaml>=6.0",
    "pydantic>=2.5.0",
]
[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23", "pytest-cov>=4.1", "ruff>=0.2", "mypy>=1.8"]

[tool.hatch.build.targets.wheel]
packages = ["src/webmcp_bridge"]

[tool.ruff]
target-version = "py310"
line-length = 100
[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "ANN", "B", "SIM"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.mypy]
python_version = "3.10"
strict = true
